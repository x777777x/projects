worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 优化传输
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # 开启 gzip 压缩 (可选，推荐开启以提升加载速度)
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json;

    server {
        listen       80;
        server_name  localhost; # 部署时请替换为您的真实域名或公网IP

        # 前端文件路由管理
        location / {
            root   /data/projects; # 注意: 这里按照您的要求使用了 /data/projecs (若为拼写错误，请改为 /data/projects)
            index  index.html index.htm;
            # 解决 Vue Router 在 history 模式下刷新页面导致 404 的问题
            try_files $uri $uri/ /index.html; 
        }

        # 后端 API 接口反向代理
        # 假设您的 FastAPI 后端运行在本机的 8000 端口，且 API 前缀为 /api
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/; # 请根据实际的后端服务地址、端口及路径进行调整
            
            # 传递真实客户端信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持 WebSocket (如果后端长链接或文件上传需要)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 静态资源缓存优化 (可选: 让图片、JS、CSS 等在使用时直接走浏览器缓存)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            root /data/projecs;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 错误页面处理 (可选)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
